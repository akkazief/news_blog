{% extends "base.html" %}
{% block nav %}
    {% if request.user.is_authenticated %}
        <a class="nav-link" href="{% url 'articles:create' %}">Добавить статью</a>
    {% endif %}
{% endblock %}
{% block content %}
    <div class="page-header d-flex justify-content-between align-items-center my-4 p-3">
        <h1>Статьи</h1>
        <form class="d-flex" action="" method="GET">
            {{ search_form }}
            <button class="btn btn-sm btn-outline-primary" type="submit">Поиск</button>
        </form>
    </div>
    {% include 'partial/articles.html' %}
{% endblock %}
