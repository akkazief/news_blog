{% if request.user.is_authenticated %}
    <span id="count-{{ prefix }}-{{ obj.pk }}">{{ obj.likes_count }}</span>
    <a href="{% url like_url_name obj.pk %}"
       class="btn btn-outline-secondary"
       data-key="likes"
       data-counter-id="count-{{ prefix }}-{{ obj.pk }}">
        {% if request.user in obj.likes.all %}<i class="fa-solid fa-heart"></i>{% else %}<i class="fa-regular fa-heart"></i>{% endif %}
    </a>
{% endif %}
